# nginx del frontend de Urban Alert.
# Sirve la SPA de Angular y actúa de reverse-proxy del backend (origen único:
# el navegador solo habla con este nginx, así que no hay CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # La API acepta imágenes de hasta 5 MB; subimos el límite del proxy.
    client_max_body_size 10m;

    # Compresión básica de estáticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API REST: /api/* -> backend:8000/* (se elimina el prefijo /api).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Imágenes subidas (servidas por el backend en /uploads).
    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }

    # SPA: cualquier ruta desconocida cae en index.html (router de Angular).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
