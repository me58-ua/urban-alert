<app-header subtitle="Registro ciudadano"></app-header>

<ion-content class="auth-page" fullscreen="true">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-card__header">
        <ion-chip class="eyebrow">
          <ion-label>Nuevo perfil</ion-label>
        </ion-chip>
        <img
          class="auth-card__logo"
          src="assets/media/images/logo-v3.png"
          alt="Urban Alert"
          width="200"
          height="200"
        />
        <h1>Crear cuenta</h1>
        <p>Regístrate para enviar reportes, guardar evidencias y recibir actualizaciones municipales.</p>
      </div>

      <form class="auth-form" (ngSubmit)="submit()">
        <label class="form-field">
          <span>Nombre completo</span>
          <ion-input
            type="text"
            name="name"
            [(ngModel)]="name"
            placeholder="Nombre y apellidos"
            autocomplete="name"
          ></ion-input>
        </label>

        <label class="form-field">
          <span>Correo electrónico</span>
          <ion-input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="tu@email.com"
            autocomplete="email"
          ></ion-input>
        </label>

        <label class="form-field">
          <span>Contraseña</span>
          <ion-input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Crea una contraseña segura"
            autocomplete="new-password"
          ></ion-input>
        </label>

        <label class="check-row check-row--terms">
          <ion-checkbox name="acceptTerms" [(ngModel)]="acceptTerms"></ion-checkbox>
          <span>Acepto las condiciones de uso y la política de privacidad.</span>
        </label>

        <p class="form-error" role="alert" *ngIf="error">{{ error }}</p>

        <app-ui-button class="primary-action" variant="primary" type="submit" expand="block" [disabled]="loading">
          Registrarme
        </app-ui-button>
      </form>

      <div class="auth-switch">
        <span>¿Ya tienes cuenta?</span>
        <a routerLink="/login">Iniciar sesión</a>
      </div>
    </section>
  </main>

  <app-footer></app-footer>
</ion-content>
