<div class="app-menu">
  <button class="menu-button" type="button" (click)="toggle($event)" aria-label="Abrir menú">
    <ion-icon name="menu-outline"></ion-icon>
  </button>

  <ion-popover
    class="app-menu-popover"
    [isOpen]="isOpen()"
    [event]="popoverEvent()"
    (didDismiss)="close()"
    side="bottom"
    alignment="end"
  >
    <ng-template>
      <nav class="menu-panel" aria-label="Menú principal">
        <div class="menu-panel__session" *ngIf="isAuthenticated()">
          <ion-icon name="person-circle-outline"></ion-icon>
          <span class="menu-panel__session-info">
            <strong class="menu-panel__session-email">{{ email() ?? 'Sesión iniciada' }}</strong>
            <span class="menu-panel__session-role" *ngIf="roleLabel() as rol">{{ rol }}</span>
          </span>
        </div>

        <a
          class="menu-panel__link"
          *ngIf="!isAuthenticated()"
          href="/login"
          (click)="goTo('/login', $event)"
        >
          <ion-icon name="person-circle-outline"></ion-icon>
          <span>Iniciar sesión / Registrarse</span>
        </a>

        <a
          class="menu-panel__link"
          *ngFor="let item of items; trackBy: trackByLabel"
          [href]="item.route"
          (click)="goTo(item.route, $event)"
        >
          <ion-icon [name]="item.icon"></ion-icon>
          <span>{{ item.label }}</span>
          <ion-badge
            *ngIf="item.route === '/notificaciones' && unreadCount() > 0"
            class="menu-panel__badge"
            color="danger"
            [attr.aria-label]="unreadCount() + ' notificaciones sin leer'"
          >{{ unreadCount() }}</ion-badge>
        </a>

        <a
          class="menu-panel__link menu-panel__link--logout"
          *ngIf="isAuthenticated()"
          href="/login"
          (click)="logout($event)"
        >
          <ion-icon name="log-out-outline"></ion-icon>
          <span>Cerrar sesión</span>
        </a>
      </nav>
    </ng-template>
  </ion-popover>
</div>
